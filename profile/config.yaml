author: piyushbag
pr_search_limit: 100

# Do not list PRs to your own repos under Contributing to (Building section covers those).
contributing_exclude_owners:
  - piyushbag

# Optional extra repo blocks (fork mirrors, private sync repos, etc.)
contributing_exclude_repos:
