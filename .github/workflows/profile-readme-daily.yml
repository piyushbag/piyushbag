name: Daily profile README refresh

on:
  schedule:
    # 09:00 America/Los_Angeles (PDT, UTC-7)
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install script dependencies
        run: pip install -r profile/requirements.txt

      - name: Generate README from live PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_profile_readme.py

      - name: Open PR if changed
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(profile): daily README refresh"
          branch: bot/profile-readme-daily
          delete-branch: true
          title: "Daily profile README refresh"
          body: |
            Automated daily refresh from `.github/workflows/profile-readme-daily.yml`.

            Updates:
            - Regenerates **Contributing to** from all upstream PRs (`gh search prs --author=piyushbag`)
            - Refreshes `*Last updated*` and `profile/pr-snapshot.json`

            Squash-merged by this workflow in the next step (same job).

      - name: Squash-merge daily README PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
