# Mergify — Merge Protections for manual PRs (Cursor Bugbot gate).
# Product enabled via Mergify API: merge_protections + workflow_automation.
# Daily README bot PRs merge in profile-readme-daily.yml (same job, no Mergify).

merge_protections_settings:
  reporting_method: check-runs
  post_comment: true
  auto_merge_conditions:
    - author = piyushbag

merge_protections:
  - name: profile-bugbot
    if:
      - base = main
      - author = piyushbag
    success_conditions:
      - check-success-or-neutral = Cursor Bugbot

pull_request_rules:
  - name: auto-merge when Bugbot passes (piyushbag)
    conditions:
      - base = main
      - author = piyushbag
      - -closed
      - check-success-or-neutral = Cursor Bugbot
    actions:
      merge:
        method: squash
