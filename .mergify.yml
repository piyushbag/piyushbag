# Mergify — auto-merge when Cursor Bugbot passes (manual PRs).
# Requires Mergify app on piyushbag/piyushbag.
# Daily README bot PRs merge via .github/workflows/profile-readme-automerge.yml
# (github-actions[bot] PRs do not get Bugbot; Mergify merge queue/protections off).

pull_request_rules:
  - name: auto-merge when Bugbot passes (piyushbag)
    conditions:
      - base = main
      - author = piyushbag
      - -closed
      - check-success-or-neutral = Cursor Bugbot
    actions:
      merge:
        method: squash

  - name: auto-merge daily README bot PRs
    conditions:
      - base = main
      - author = github-actions[bot]
      - head = bot/profile-readme-daily
      - -closed
      - -conflict
      - -draft
    actions:
      merge:
        method: squash
