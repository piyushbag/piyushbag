# Mergify — auto-merge via Merge Protections (Mergify 2026 model).
# Install app: https://github.com/apps/mergify (enable on piyushbag/piyushbag)
# Bugbot: https://cursor.com/dashboard (enable on piyushbag/piyushbag)
#
# Manual PRs (piyushbag): Cursor Bugbot must pass → auto-merge.
# Daily README bot PRs (github-actions): no Bugbot → auto-merge when branch is clean.

merge_protections_settings:
  reporting_method: check-runs
  post_comment: true
  auto_merge_conditions:
    - or:
        - author = piyushbag
        - author = github-actions[bot]

merge_protections:
  - name: profile-bugbot
    if:
      - base = main
      - author = piyushbag
    success_conditions:
      - check-success-or-neutral = Cursor Bugbot

  - name: daily-readme-bot
    if:
      - base = main
      - author = github-actions[bot]
      - head ~= ^bot/profile-readme-daily
    success_conditions:
      - -closed
      - -conflict
      - -draft
